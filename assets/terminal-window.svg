<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Animated terminal demo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="typingClip">
      <rect x="290" y="304" width="0" height="28">
        <animate attributeName="width" values="0;0;560;560" keyTimes="0;0.15;0.45;1" dur="2.1s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect x="40" y="26" rx="16" ry="16" width="1120" height="368" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="40" y="26" rx="16" ry="16" width="1120" height="44" fill="url(#bar)"/>
  <circle cx="72" cy="48" r="7" fill="#ff5f56"/>
  <circle cx="96" cy="48" r="7" fill="#ffbd2e"/>
  <circle cx="120" cy="48" r="7" fill="#27c93f"/>
  <text x="560" y="53" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" text-anchor="middle">prompt-ai-guide terminal preview</text>

  <text x="72" y="110" fill="#22d3ee" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="21">$</text>
  <text x="95" y="110" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="21">fetch + analyze https://github.com/MooseQuest/prompt-ai-guide</text>

  <text x="72" y="152" fill="#67e8f9" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20">&gt; reading repository structure...</text>
  <text x="72" y="184" fill="#67e8f9" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20">&gt; creating prompt.ai/development_log.md</text>
  <text x="72" y="216" fill="#67e8f9" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20">&gt; creating prompt.ai/git_workflow.md</text>
  <text x="72" y="248" fill="#67e8f9" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20">&gt; creating .cursor/rules/prompt-ai.mdc</text>
  <text x="72" y="280" fill="#67e8f9" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20">&gt; updating README.md + CONTRIBUTING.md</text>

  <text x="72" y="322" fill="#4ade80" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20">AI&gt;</text>
  <text x="130" y="322" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20" clip-path="url(#typingClip)">workflow installed. all files created in milliseconds.</text>
  <rect x="688" y="305" width="12" height="22" fill="#f8fafc">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="2.1s" repeatCount="indefinite"/>
  </rect>

  <text x="72" y="360" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">Typing speed target: ~20ms/character feel (fast terminal simulation).</text>
</svg>
